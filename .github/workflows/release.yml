name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Verify tag commit is on main
        shell: bash
        run: |
          git fetch origin main --force
          TAG_COMMIT="$(git rev-parse HEAD)"

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} must point to a commit on main." >&2
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Pack release tarball
        shell: bash
        run: |
          TARBALL_NAME="$(npm pack)"
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ env.PACKAGE_VERSION }}
          path: ${{ env.TARBALL_NAME }}

      - name: Publish to npm
        run: npm publish

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.TARBALL_NAME }}
